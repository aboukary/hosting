{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Student Manager{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

{% if user.is_authenticated %}

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="#">
            Student Manager
        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link" href="{% url 'dashboard' %}">
                Dashboard
            </a>

            <a class="nav-link" href="{% url 'student_list' %}">
                <i class="bi bi-mortarboard"></i> Étudiants
            </a>

            <a class="nav-link" href="{% url 'student_add' %}">
                <i class="bi bi-plus-circle"></i> Ajouter
            </a>

            <a class="nav-link" href="#">
                        Ajouter
                    </a>

        <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-link nav-link text-white p-0 border-0">
                Déconnexion
            </button>
        </form>
        </div>

    </div>

</nav>

{% endif %}

<div class="container mt-4">

    {% block content %}

    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
