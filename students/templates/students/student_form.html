{% extends "base.html" %}

{% block title %}Étudiant{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h4>Étudiant</h4>

    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">

                Enregistrer

            </button>

            <a href="{% url 'student_list' %}"
               class="btn btn-secondary">

                Annuler

            </a>

        </form>

    </div>

</div>

{% endblock %}
